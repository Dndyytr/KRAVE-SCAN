    <circle cx="448" cy="470" r="8" fill="#67B96E"/>
    <circle cx="545" cy="485" r="9" fill="#67B96E"/>
    <circle cx="600" cy="518" r="8" fill="#67B96E"/>
    <circle cx="650" cy="495" r="7" fill="#67B96E"/>
    <circle cx="362" cy="540" r="8" fill="#67B96E"/>
    <circle cx="610" cy="560" r="9" fill="#67B96E"/>
