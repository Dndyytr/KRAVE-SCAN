<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="bowlGrad" x1="220" y1="560" x2="804" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8C7D5"/>
      <stop offset="1" stop-color="#E88CA2"/>
    </linearGradient>
    <linearGradient id="soupGrad" x1="290" y1="360" x2="734" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D2B08A"/>
      <stop offset="1" stop-color="#B98B63"/>
    </linearGradient>
    <linearGradient id="meatballGrad" x1="380" y1="360" x2="650" y2="670" gradientUnits="userSpaceOnUse">
